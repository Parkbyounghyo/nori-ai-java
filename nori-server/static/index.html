<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nori AI — Java 개발 도우미</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #1e1e1e; --bg2: #252526; --bg3: #2d2d30; --bg4: #3c3c3c;
  --fg: #d4d4d4; --fg2: #858585; --accent: #569cd6; --accent2: #4ec9b0;
  --green: #6a9955; --orange: #ce9178; --red: #f44747; --yellow: #dcdcaa;
  --border: #404040; --hover: #094771;
}
body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--fg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* ── 헤더 ── */
.header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; background: var(--bg3); border-bottom: 1px solid var(--border); min-height: 44px; }
.header h1 { font-size: 14px; font-weight: 600; color: var(--accent); }
.header h1 span { color: var(--accent2); }
.status { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--fg2); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); }
.status-dot.connected { background: var(--accent2); }
.model-badge { background: var(--bg4); padding: 2px 8px; border-radius: 10px; font-size: 11px; color: var(--yellow); }

/* ── 메인 레이아웃 ── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ── 좌측: 코드 에디터 ── */
.editor-panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); min-width: 0; }
.editor-toolbar { display: flex; align-items: center; gap: 4px; padding: 6px 8px; background: var(--bg2); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.editor-toolbar .separator { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
.tab-bar { display: flex; align-items: center; padding: 0 8px; background: var(--bg3); }
.tab { padding: 6px 16px; font-size: 12px; color: var(--fg2); cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: var(--fg); border-bottom-color: var(--accent); background: var(--bg); }
.tab:hover:not(.active) { color: var(--fg); }

.btn { padding: 4px 10px; font-size: 12px; border: 1px solid var(--border); background: var(--bg4); color: var(--fg); cursor: pointer; border-radius: 3px; white-space: nowrap; transition: all 0.15s; }
.btn:hover { background: var(--hover); border-color: var(--accent); }
.btn:active { transform: scale(0.97); }
.btn.primary { background: #0e639c; border-color: #1177bb; }
.btn.primary:hover { background: #1177bb; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.project-section { margin-top: 6px; padding: 6px 0; border-top: 1px solid var(--border); }
.project-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.project-row label { min-width: 56px; font-size: 11px; color: var(--fg2); }
.project-row select { flex: 1; min-width: 120px; padding: 4px 8px; background: var(--bg); border: 1px solid var(--border); color: var(--fg); border-radius: 4px; font-size: 12px; }
.project-row select:disabled { opacity: 0.6; cursor: not-allowed; }

.editor-area { flex: 1; position: relative; }
.editor-area textarea {
  width: 100%; height: 100%; padding: 12px 16px; padding-left: 56px;
  background: var(--bg); color: var(--fg); border: none; outline: none;
  font-family: 'Cascadia Code', 'D2Coding', 'Consolas', monospace;
  font-size: 14px; line-height: 1.6; resize: none; tab-size: 4;
}
.line-numbers {
  position: absolute; left: 0; top: 0; width: 44px; height: 100%;
  padding: 12px 8px; text-align: right; font-family: 'Cascadia Code', 'Consolas', monospace;
  font-size: 14px; line-height: 1.6; color: var(--fg2); background: var(--bg);
  border-right: 1px solid var(--border); pointer-events: none; overflow: hidden;
  user-select: none;
}
.editor-footer { display: flex; justify-content: space-between; padding: 4px 12px; background: var(--bg3); border-top: 1px solid var(--border); font-size: 11px; color: var(--fg2); }

/* ── 결과 패널 ── */
.result-panel { display: none; flex-direction: column; border-top: 1px solid var(--border); max-height: 40%; }
.result-panel.visible { display: flex; }
.result-header { display: flex; justify-content: space-between; align-items: center; padding: 6px 12px; background: var(--bg2); }
.result-header span { font-size: 12px; color: var(--accent2); font-weight: 600; }
.result-body { flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; font-family: 'Cascadia Code', 'D2Coding', 'Consolas', monospace; background: var(--bg); }

/* ── 우측: 채팅 ── */
.chat-panel { width: 420px; display: flex; flex-direction: column; background: var(--bg2); flex-shrink: 0; }
.chat-header { padding: 10px 16px; background: var(--bg3); border-bottom: 1px solid var(--border); font-size: 13px; font-weight: 600; color: var(--accent); display: flex; justify-content: space-between; align-items: center; }
.chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.msg { max-width: 92%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; word-break: break-word; }
.msg.user { align-self: flex-end; background: #0e639c; color: #fff; border-bottom-right-radius: 4px; }
.msg.assistant { align-self: flex-start; background: var(--bg4); color: var(--fg); border-bottom-left-radius: 4px; }
.msg.assistant pre { background: var(--bg); padding: 8px 10px; border-radius: 4px; margin: 6px 0; overflow-x: auto; font-size: 12px; line-height: 1.5; }
.msg.assistant code { font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px; }
.msg.system { align-self: center; background: transparent; color: var(--fg2); font-size: 11px; font-style: italic; padding: 4px; }
.msg .time { font-size: 10px; color: var(--fg2); margin-top: 4px; text-align: right; }
.typing { display: flex; gap: 4px; padding: 12px 14px; align-self: flex-start; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--fg2); animation: typing 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing { 0%,60%,100% { opacity: 0.3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-4px); } }

.chat-input-area { padding: 10px 12px; background: var(--bg3); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.chat-options { display: flex; align-items: center; gap: 8px; font-size: 11px; }
.chat-options label { color: var(--fg2); cursor: pointer; display: flex; align-items: center; gap: 4px; }
.chat-options input[type="checkbox"] { accent-color: var(--accent); }
.chat-input-row { display: flex; gap: 8px; }
.chat-input-row textarea { flex: 1; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; font-size: 13px; resize: none; outline: none; min-height: 40px; max-height: 120px; }
.chat-input-row textarea:focus { border-color: var(--accent); }
.chat-input-row .btn { align-self: flex-end; height: 40px; padding: 0 16px; }

/* ── 리사이저 ── */
.resizer { width: 4px; cursor: col-resize; background: var(--border); transition: background 0.2s; flex-shrink: 0; }
.resizer:hover, .resizer.dragging { background: var(--accent); }

/* ── 스크롤바 ── */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--fg2); }

/* ── 로딩 오버레이 ── */
.loading-overlay { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 10; align-items: center; justify-content: center; }
.loading-overlay.visible { display: flex; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--bg4); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 마크다운 기본 치환 ── */
.md-content h3 { color: var(--accent); margin: 8px 0 4px; font-size: 14px; }
.md-content ul, .md-content ol { padding-left: 20px; margin: 4px 0; }
.md-content li { margin: 2px 0; }
.md-content strong { color: var(--yellow); }
</style>
</head>
<body>

<!-- ── 헤더 ── -->
<div class="header">
  <h1>🍘 Nori AI <span>Java 개발 도우미</span></h1>
  <div class="status">
    <span class="model-badge" id="modelBadge">-</span>
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">연결 중...</span>
  </div>
</div>

<!-- ── 메인 ── -->
<div class="main">
  <!-- 좌측: 에디터 -->
  <div class="editor-panel" id="editorPanel">
    <div class="tab-bar">
      <div class="tab active">코드 에디터</div>
    </div>
    <div class="editor-toolbar">
      <button class="btn" onclick="doAction('explain')" title="코드 설명">💡 설명</button>
      <button class="btn" onclick="doAction('review')" title="코드 리뷰">🔍 리뷰</button>
      <button class="btn" onclick="doAction('refactor')" title="리팩토링">♻️ 리팩토링</button>
      <div class="separator"></div>
      <button class="btn" onclick="doAction('test')" title="테스트 생성">🧪 테스트</button>
      <button class="btn" onclick="doAction('doc')" title="JavaDoc 생성">📝 JavaDoc</button>
      <div class="separator"></div>
      <button class="btn" onclick="doAction('error')" title="에러 분석">🐛 에러분석</button>
      <button class="btn" onclick="doAction('fix')" title="에러 수정">🔧 자동수정</button>
      <div class="separator"></div>
      <button class="btn primary" onclick="doAction('generate')" title="코드 생성">⚡ 생성</button>
    </div>
    <div class="editor-area">
      <div class="line-numbers" id="lineNumbers">1</div>
      <textarea id="codeEditor" spellcheck="false" placeholder="여기에 Java 코드를 붙여넣거나 작성하세요...

예시:
public class UserService {
    private final UserRepository userRepository;

    public UserService(UserRepository userRepository) {
        this.userRepository = userRepository;
    }

    public User findById(Long id) {
        return userRepository.findById(id)
            .orElseThrow(() -> new RuntimeException(&quot;사용자를 찾을 수 없습니다&quot;));
    }
}"></textarea>
      <div class="loading-overlay" id="editorLoading"><div class="spinner"></div></div>
    </div>
    <div class="editor-footer">
      <span id="editorInfo">Java | UTF-8</span>
      <span id="cursorPos">Ln 1, Col 1</span>
    </div>

    <!-- 결과 패널 -->
    <div class="result-panel" id="resultPanel">
      <div class="result-header">
        <span id="resultTitle">결과</span>
        <button class="btn" onclick="closeResult()" style="padding:2px 8px;">✕ 닫기</button>
      </div>
      <div class="result-body md-content" id="resultBody"></div>
    </div>
  </div>

  <!-- 리사이저 -->
  <div class="resizer" id="resizer"></div>

  <!-- 우측: 채팅 -->
  <div class="chat-panel" id="chatPanel">
    <div class="chat-header">
      <span>💬 Nori 채팅</span>
      <button class="btn" onclick="clearChat()" style="padding:2px 8px; font-size:11px;">🗑 초기화</button>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="msg system">Nori AI에 오신 걸 환영해요! Java 관련 뭐든 물어보세요.</div>
    </div>
    <div class="chat-input-area">
      <div class="chat-options">
        <label><input type="checkbox" id="useRag" checked> 📚 RAG 검색</label>
        <label><input type="checkbox" id="sendCode"> 📎 에디터 코드 첨부</label>
        <label><input type="checkbox" id="useProject" onchange="onUseProjectChange()"> 📁 프로젝트 프로필 사용</label>
      </div>
      <div id="projectSection" class="project-section" style="display:none;">
        <div class="project-row">
          <label>프로젝트</label>
          <select id="projectSelect" disabled>
            <option value="">— 프로필 없음. 먼저 등록 —</option>
          </select>
          <button type="button" class="btn btn-sm" onclick="openProfileUpload()">📤 프로필 등록</button>
          <button type="button" class="btn btn-sm" id="btnProjectUpdate" onclick="reembedProject()" disabled title="선택한 프로젝트 인덱스 재구성">🔄 인덱스 업데이트</button>
        </div>
      </div>
      <div class="chat-input-row">
        <textarea id="chatInput" rows="2" placeholder="메시지를 입력하세요... (Shift+Enter: 줄바꿈)" onkeydown="handleChatKey(event)"></textarea>
        <button class="btn primary" id="sendBtn" onclick="sendChat()">전송</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── 설정 ──
const API = 'http://localhost:8090/api/v1';
let chatHistory = [];
let isProcessing = false;

// ── 서버 연결 체크 ──
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    document.getElementById('statusDot').className = 'status-dot connected';
    document.getElementById('statusText').textContent = '연결됨';
    const model = d.ai_model || d.ai_provider || '-';
    document.getElementById('modelBadge').textContent = `${d.ai_provider} / ${model}`;
    return true;
  } catch {
    document.getElementById('statusDot').className = 'status-dot';
    document.getElementById('statusText').textContent = '연결 실패';
    document.getElementById('modelBadge').textContent = '오프라인';
    return false;
  }
}

// ── 줄 번호 ──
const editor = document.getElementById('codeEditor');
const lineNums = document.getElementById('lineNumbers');

function updateLineNumbers() {
  const lines = editor.value.split('\n').length;
  lineNums.textContent = Array.from({length: lines}, (_, i) => i + 1).join('\n');
}

function updateCursorPos() {
  const val = editor.value.substring(0, editor.selectionStart);
  const line = val.split('\n').length;
  const col = val.split('\n').pop().length + 1;
  document.getElementById('cursorPos').textContent = `Ln ${line}, Col ${col}`;
}

editor.addEventListener('input', updateLineNumbers);
editor.addEventListener('scroll', () => { lineNums.scrollTop = editor.scrollTop; });
editor.addEventListener('click', updateCursorPos);
editor.addEventListener('keyup', updateCursorPos);

// Tab 키 지원
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    editor.value = editor.value.substring(0, start) + '    ' + editor.value.substring(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = start + 4;
    updateLineNumbers();
  }
});

// ── API 호출 ──
async function apiCall(endpoint, body) {
  const resp = await fetch(`${API}${endpoint}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err.error || err.detail || `HTTP ${resp.status}`);
  }
  return resp.json();
}

// ── 에디터 액션 ──
const ACTION_MAP = {
  explain:  { endpoint: '/explain',       title: '💡 코드 설명',     field: 'explanation' },
  review:   { endpoint: '/review',        title: '🔍 코드 리뷰',     field: 'review' },
  refactor: { endpoint: '/refactor',      title: '♻️ 리팩토링',      field: 'refactored_code' },
  test:     { endpoint: '/test/generate', title: '🧪 테스트 코드',   field: 'test_code' },
  doc:      { endpoint: '/doc/generate',  title: '📝 JavaDoc',       field: 'documented_code' },
  error:    { endpoint: '/error/analyze', title: '🐛 에러 분석',     field: 'analysis' },
  fix:      { endpoint: '/error/fix',     title: '🔧 자동 수정',     field: 'fixed_code' },
  generate: { endpoint: '/generate',      title: '⚡ 코드 생성',     field: 'code' },
};

async function doAction(action) {
  const code = editor.value.trim();
  if (!code) { alert('코드를 먼저 입력해주세요!'); editor.focus(); return; }
  if (isProcessing) return;

  const info = ACTION_MAP[action];
  const loading = document.getElementById('editorLoading');
  const resultPanel = document.getElementById('resultPanel');
  const resultTitle = document.getElementById('resultTitle');
  const resultBody = document.getElementById('resultBody');

  isProcessing = true;
  loading.classList.add('visible');
  resultTitle.textContent = `${info.title} — 처리 중...`;
  resultPanel.classList.add('visible');
  resultBody.textContent = '⏳ AI가 분석 중입니다...';

  try {
    let body;
    if (action === 'error' || action === 'fix') {
      body = { error_message: code.split('\n')[0], code: code };
    } else if (action === 'generate') {
      body = { description: code, language: 'java' };
    } else {
      body = { code: code, language: 'java' };
    }

    const data = await apiCall(info.endpoint, body);
    const result = data.data?.[info.field] || JSON.stringify(data.data, null, 2);
    resultTitle.textContent = `${info.title}`;
    resultBody.innerHTML = renderMarkdown(result);
  } catch (e) {
    resultTitle.textContent = `${info.title} — 오류`;
    resultBody.textContent = `❌ ${e.message}`;
  } finally {
    isProcessing = false;
    loading.classList.remove('visible');
  }
}

function closeResult() {
  document.getElementById('resultPanel').classList.remove('visible');
}

// ── 채팅 ──
function appendMessage(role, content) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (role === 'assistant') {
    div.innerHTML = `<div class="md-content">${renderMarkdown(content)}</div><div class="time">${new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'})}</div>`;
  } else if (role === 'user') {
    div.textContent = content;
    const time = document.createElement('div');
    time.className = 'time';
    time.textContent = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
    div.appendChild(time);
  }
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  document.getElementById('typingIndicator')?.remove();
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  let message = input.value.trim();
  if (!message || isProcessing) return;

  const sendCode = document.getElementById('sendCode').checked;
  const useRag = document.getElementById('useRag').checked;

  if (sendCode && editor.value.trim()) {
    message += `\n\n[에디터 코드]\n\`\`\`java\n${editor.value.trim()}\n\`\`\``;
  }

  appendMessage('user', input.value.trim());
  input.value = '';
  input.style.height = 'auto';

  chatHistory.push({ role: 'user', content: message });

  isProcessing = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  const useProject = document.getElementById('useProject').checked;
  const projectId = useProject ? (document.getElementById('projectSelect')?.value || '') : '';
  try {
    const data = await apiCall('/chat', {
      message: message,
      history: chatHistory.slice(-10),
      use_rag: useRag,
      project_id: projectId || undefined,
      user_id: 'default',
    });

    hideTyping();
    const answer = data.data?.answer || '응답을 받지 못했습니다.';
    appendMessage('assistant', answer);
    chatHistory.push({ role: 'assistant', content: answer });
  } catch (e) {
    hideTyping();
    appendMessage('assistant', `❌ 오류: ${e.message}`);
  } finally {
    isProcessing = false;
    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

function clearChat() {
  chatHistory = [];
  const container = document.getElementById('chatMessages');
  container.innerHTML = '<div class="msg system">대화가 초기화되었습니다.</div>';
}

// ── 간이 마크다운 렌더 ──
function renderMarkdown(text) {
  if (!text) return '';
  let html = escapeHtml(text);

  // 코드 블록
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    return `<pre><code>${code.trim()}</code></pre>`;
  });

  // 인라인 코드
  html = html.replace(/`([^`]+)`/g, '<code style="background:var(--bg);padding:1px 5px;border-radius:3px;">$1</code>');

  // 볼드
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // 헤더
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h3 style="font-size:15px;">$1</h3>');

  // 리스트
  html = html.replace(/^- (.+)$/gm, '• $1');
  html = html.replace(/^(\d+)\. (.+)$/gm, '$1. $2');

  // 줄바꿈
  html = html.replace(/\n/g, '<br>');
  // pre 내부 br 제거
  html = html.replace(/<pre><code>([\s\S]*?)<\/code><\/pre>/g, (match) => {
    return match.replace(/<br>/g, '\n');
  });

  return html;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ── 리사이저 드래그 ──
const resizer = document.getElementById('resizer');
const editorPanel = document.getElementById('editorPanel');
const chatPanel = document.getElementById('chatPanel');

let isResizing = false;
resizer.addEventListener('mousedown', (e) => {
  isResizing = true;
  resizer.classList.add('dragging');
  document.addEventListener('mousemove', onResize);
  document.addEventListener('mouseup', () => {
    isResizing = false;
    resizer.classList.remove('dragging');
    document.removeEventListener('mousemove', onResize);
  }, { once: true });
});

function onResize(e) {
  if (!isResizing) return;
  const containerWidth = document.querySelector('.main').offsetWidth;
  const chatWidth = Math.max(280, Math.min(700, containerWidth - e.clientX));
  chatPanel.style.width = chatWidth + 'px';
}

// ── textarea 자동 높이 ──
document.getElementById('chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// ── 프로젝트 프로필 ──
let projectsCache = [];

async function loadProjects() {
  try {
    const r = await fetch(`${API}/profile/list`);
    const d = await r.json();
    if (d.success && d.data?.projects) {
      projectsCache = d.data.projects;
      return projectsCache;
    }
  } catch (e) {
    console.warn('프로젝트 목록 로드 실패:', e);
  }
  return [];
}

function onUseProjectChange() {
  const cb = document.getElementById('useProject');
  const sec = document.getElementById('projectSection');
  const sel = document.getElementById('projectSelect');
  if (cb.checked) {
    sec.style.display = 'block';
    loadProjects().then(projects => {
      const ready = projects.filter(p => p.embedding_status === 'ready');
      sel.innerHTML = '<option value="">— 선택 —</option>' +
        ready.map(p => `<option value="${p.project_id}">${p.name || p.project_id} ✓</option>`).join('');
      sel.disabled = ready.length === 0;
      document.getElementById('btnProjectUpdate').disabled = ready.length === 0;
      if (ready.length === 0 && projects.length > 0) {
        sel.innerHTML += projects.filter(p => p.embedding_status !== 'ready').map(p =>
          `<option value="${p.project_id}" disabled>${p.name || p.project_id} (임베딩 ${p.embedding_status})</option>`
        ).join('');
      }
    });
    appendMessage('system', '📁 프로젝트 프로필이 활성화되었습니다. 프로젝트를 선택하면 해당 프로필 기반으로 더 정확한 답변을 받을 수 있습니다.');
  } else {
    sec.style.display = 'none';
  }
}

async function reembedProject() {
  const sel = document.getElementById('projectSelect');
  const pid = sel?.value;
  if (!pid) { alert('프로젝트를 먼저 선택하세요.'); return; }
  const btn = document.getElementById('btnProjectUpdate');
  if (btn) btn.disabled = true;
  try {
    const r = await fetch(`${API}/profile/${pid}/reembed`, { method: 'PUT' });
    const d = await r.json();
    if (d.success) {
      appendMessage('system', '🔄 인덱스 업데이트를 시작했습니다. 잠시 후 검색이 갱신됩니다.');
    } else {
      alert(d.error || '실패');
    }
  } catch (e) {
    alert('업데이트 실패: ' + e.message);
  } finally {
    if (btn) btn.disabled = false;
  }
}

function openProfileUpload() {
  const name = prompt('프로젝트 이름을 입력하세요', '');
  if (!name) return;
  const content = prompt('프로필 내용(.nori-profile.md)을 붙여넣으세요. 취소 시 파일 선택 대화상자가 열릴 수 있습니다.', '');
  if (content === null) return;
  if (!content.trim()) {
    alert('프로필 내용이 비어 있습니다.');
    return;
  }
  fetch(`${API}/profile/upload`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ content: content.trim(), name, user_id: 'default' }),
  })
    .then(r => r.json())
    .then(d => {
      if (d.success) {
        alert('프로필이 등록되었습니다. 임베딩은 백그라운드에서 진행됩니다. 잠시 후 프로젝트 목록을 새로고침하세요.');
        onUseProjectChange();
      } else {
        alert('등록 실패: ' + (d.error || '알 수 없음'));
      }
    })
    .catch(e => alert('등록 실패: ' + e.message));
}

// ── 초기화 ──
updateLineNumbers();
checkHealth();
setInterval(checkHealth, 30000);
</script>
